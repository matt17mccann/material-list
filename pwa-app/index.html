  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #F5F5F4; color: #1C1C1C; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
    #root { min-height: 100vh; min-height: -webkit-fill-available; }
    input, select, button { font-family: inherit; }
    input:focus, select:focus { outline: none; border-color: #6DB344 !important; box-shadow: 0 0 0 2px rgba(109,179,68,0.15); }
    button:active { transform: scale(0.97); }

    @media print {
      .no-print { display: none !important; }
      body { background: #fff; }
    }

    /* Splash / loading */
    .splash { display: flex; align-items: center; justify-content: center; height: 100vh; background: #1C1C1C; flex-direction: column; gap: 16px; }
    .splash-text { color: #6DB344; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
  </style>

    function FractionInput({ label, wholeValue, fracValue, onWholeChange, onFracChange, placeholder, labelStyle }) {
      return (
        <div>
          <label style={labelStyle}>{label}</label>
          <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
            <input
              style={{ width: "50%", padding: "12px 8px", border: "1px solid #ddd", borderRadius: "6px 0 0 6px", fontSize: 20, fontWeight: 800, textAlign: "center", boxSizing: "border-box", outline: "none" }}
              type="number"
              inputMode="numeric"
              min="0"
              value={wholeValue}
              onChange={e => onWholeChange(e.target.value)}
              placeholder={placeholder || "0"}
            />
            <select
              style={{ width: "50%", padding: "12px 4px", border: "1px solid #ddd", borderLeft: "none", borderRadius: "0 6px 6px 0", fontSize: 15, fontWeight: 600, textAlign: "center", boxSizing: "border-box", background: "#fff", appearance: "auto", outline: "none" }}
              value={fracValue}
              onChange={e => onFracChange(e.target.value)}
            >
              {FRACTIONS.map(f => (
                <option key={f.label} value={f.value}>{f.label}</option>
              ))}
            </select>
          </div>
        </div>
      );
    }

    function getAvailableProfiles(species) {
      return CASING_PROFILES.filter(p => !p.pineOnly || species === "Pine");
    }

    // Catalog-aware filtering: checks if a profile/stock has any length available for a species
    function isProfileAvailableInCatalog(catalog, profileLabel, species) {
      if (!catalog?.casingProfiles) return true;
      const entry = catalog.casingProfiles.find(p => p.label === profileLabel);
      if (!entry || !entry.availability?.[species]) return true; // not in catalog = assume available
      return ALL_LENGTHS.some(l => entry.availability[species][l.key] !== false);
    }

    function isSpeciesAvailableInCatalog(catalog, species) {
      if (!catalog?.casingProfiles) return true;
      // A species is available if at least one profile or jamb stock has a length available
      const hasProfile = (catalog.casingProfiles || []).some(p =>
        ALL_LENGTHS.some(l => p.availability?.[species]?.[l.key] !== false)
      );
      const hasStock = (catalog.jambStock || []).some(j =>
        ALL_LENGTHS.some(l => j.availability?.[species]?.[l.key] !== false)
      );
      return hasProfile || hasStock;
    }

    function getAvailableLengthsForSpecies(catalog, species, section) {
      if (!catalog?.[section]) return ALL_LENGTHS.map(l => parseInt(l.key));
      const lengths = new Set();
      (catalog[section] || []).forEach(item => {
        ALL_LENGTHS.forEach(l => {
          if (item.availability?.[species]?.[l.key] !== false) lengths.add(parseInt(l.key));
        });
      });
      return lengths.size > 0 ? [...lengths] : ALL_LENGTHS.map(l => parseInt(l.key));
    }

    function getProfileWidth(profileLabel) {
      const p = CASING_PROFILES.find(pr => pr.label === profileLabel);
      return p ? p.width : 2.5;
    }


    function toFraction(decimal) {
      if (decimal == null || isNaN(decimal)) return "—";
      if (decimal === 0) return "0";
      const neg = decimal < 0;
      decimal = Math.abs(decimal);
      const whole = Math.floor(decimal);
      const frac = decimal - whole;
      const fractions = [
        [1/16,"1/16"],[1/8,"1/8"],[3/16,"3/16"],[1/4,"1/4"],
        [5/16,"5/16"],[3/8,"3/8"],[7/16,"7/16"],[1/2,"1/2"],
        [9/16,"9/16"],[5/8,"5/8"],[11/16,"11/16"],[3/4,"3/4"],
        [13/16,"13/16"],[7/8,"7/8"],[15/16,"15/16"],[1,""]
      ];
      let result;
      if (frac < 0.01) {
        result = `${whole}`;
      } else {
        let closest = fractions[0];
        for (const f of fractions) {
          if (Math.abs(f[0] - frac) < Math.abs(closest[0] - frac)) closest = f;
        }
        if (closest[0] === 1) result = `${whole + 1}`;
        else result = whole > 0 ? `${whole}-${closest[1]}` : closest[1];
      }
      return neg ? `-${result}` : result;
    }

    // ─── JSON PARSER (rSuite DL Export) ───
    function fractionStringToDecimal(str) {
      if (!str) return 0;
      const m = String(str).match(/^(\d+)\/(\d+)$/);
      return m ? parseInt(m[1]) / parseInt(m[2]) : 0;
    }

    function parseRSuiteJSON(data) {
      const jobInfo = { customerName: "", address: "", trimStyle: "Picture Frame", species: "Oak", casingProfile: '2-1/2" Colonial (C115)', finishNote: "" };

      // Customer name
      const contact = (data.contactList || [])[0];
      if (contact) jobInfo.customerName = ((contact.FirstName || "") + " " + (contact.LastName || "")).trim();

      // Address
      const acct = data.account || {};
      const parts = [acct.ShippingStreet, acct.ShippingCity, acct.ShippingStateCode, acct.ShippingPostalCode].filter(Boolean).map(s => String(s).trim());
      jobInfo.address = parts.join(", ");

      // Order items
      const oiList = data?.opptyContainer?.anOrderContainer?.oiContainerList || [];
      const units = [];
      let miscNotes = "";

      for (const item of oiList) {
        const oi = item.oi || {};
        if (oi.Product_Class__c !== "Master Product") continue;
        const uid = oi.Unit_Id__c;
        if (!uid) continue;

        // 900 = job misc (species/casing/finish info)
        if (uid === "900") {
          miscNotes = oi.Notes__c || "";
          continue;
        }

        // Map product type
        let unitType = "Window";
        const pt = (oi.rSuite_Product_Type__c || "").toLowerCase();
        if (pt.includes("entry") || pt.includes("door") && !pt.includes("patio")) unitType = "Entry Door";
        else if (pt.includes("patio")) unitType = "Patio Door";

        units.push({
          unitType,
          label: uid,
          location: oi.Room__c || "",
          widthWhole: oi.Width_Inches__c || 0,
          widthFrac: fractionStringToDecimal(oi.Width_Fraction__c),
          heightWhole: oi.Height_Inches__c || 0,
          heightFrac: fractionStringToDecimal(oi.Height_Fraction__c),
          jambDepthWhole: null,
          jambDepthFrac: null,
        });
      }

      // Parse 900 notes for species, casing, trim, finish
      if (miscNotes) {
        const specM = miscNotes.match(/\b(oak|pine|maple|basswood)\b/i);
        if (specM) jobInfo.species = specM[1].charAt(0).toUpperCase() + specM[1].slice(1).toLowerCase();

        const casingMap = [
          [/\bC115\b/, '2-1/2" Colonial (C115)'], [/\bC118\b/, '2-1/2" Colonial (C118)'],
          [/\bH115\b/, '2-1/4" Colonial (H115)'], [/lakeside/i, '2-1/2" Lakeside Colonial (RBA-Lside-2.5)'],
          [/3.?1\/4.{0,6}colonial/i, '3-1/4" Colonial (RBA-Col-3.25)'],
          [/2.?1\/2.{0,6}flat/i, '2-1/2" Flat (RBA-Flat-2.5)'], [/3.?1\/4.{0,6}flat/i, '3-1/4" Flat (RBA-Flat-3.25)'],
          [/2.?1\/2.{0,6}ranch/i, '2-1/2" Ranch'], [/2.?1\/4.{0,6}ranch/i, '2-1/4" Ranch'],
          [/knotty.?pine/i, '1x4 Knotty Pine'], [/1x4.*s4s/i, '1x4 (RBA-S4S-3.5)'], [/1x3.*s4s/i, '1x3 (RBA-S4S-2.5)'],
        ];
        for (const [pat, label] of casingMap) { if (pat.test(miscNotes)) { jobInfo.casingProfile = label; break; } }

        if (/picture[\s-]?frame/i.test(miscNotes)) jobInfo.trimStyle = "Picture Frame";
        else if (/traditional/i.test(miscNotes)) jobInfo.trimStyle = "Traditional";

        const finishes = ["Premium Teak","Dark Walnut","Golden Oak","Provincial","Colonial Maple","Clear Poly","Golden Hickory","Honey Maple","Fruitwood","Aged Bourbon","River Stream","Dark River Stream","Honey Lite","RBA White","RBA Black","RBA Canvas"];
        for (const f of finishes) { if (miscNotes.includes(f)) { jobInfo.finishNote = f; break; } }
      }

      return { jobInfo, units: units.sort((a, b) => parseInt(a.label) - parseInt(b.label)) };
    }

    // ─── PDF TEXT PARSER (RBA Installer Package) ───
    function parseFraction(str) {
      // "95-7/8" -> { whole: 95, frac: 0.875 }  |  "95" -> { whole: 95, frac: 0 }
      const m = String(str).match(/^(\d+)-(\d+)\/(\d+)$/);
      if (m) return { whole: parseInt(m[1]), frac: parseInt(m[2]) / parseInt(m[3]) };
      return { whole: parseInt(str) || 0, frac: 0 };
    }

    function parseInstallerPackageText(text) {
      const jobInfo = { customerName: "", address: "", trimStyle: "Picture Frame", species: "Oak", casingProfile: '2-1/2" Colonial (C115)', finishNote: "" };

      // --- Customer name: appears after "dba:" or "RENEWAL BY ANDERSEN" header line ---
      const nameM = text.match(/(?:dba:|RENEWAL BY ANDERSEN)[^\n]*\n\s*([A-Z][a-z]+(?: [A-Z][a-z]+)+)/);
      if (nameM) jobInfo.customerName = nameM[1].trim();

      // --- Address: street number + street name + city/state/zip ---
      const addrM = text.match(/(\d+\s+[^\n,]{5,60}(?:Road|Rd|Avenue|Ave|Street|St|Drive|Dr|Lane|Ln|Way|Court|Ct|Blvd|County Road|Cty Rd)[^\n]*)\s*\n\s*([A-Za-z][\w\s]+,\s*[A-Z]{2}\s+\d{5})/i);
      if (addrM) jobInfo.address = `${addrM[1].trim()}, ${addrM[2].trim()}`;

      // --- Species (from 900 line) ---
      const specM = text.match(/\b(oak|pine|maple|basswood)\b/i);
      if (specM) jobInfo.species = specM[1].charAt(0).toUpperCase() + specM[1].slice(1).toLowerCase();

      // --- Casing profile (from 900 line) ---
      const casingMap = [
        [/\bC115\b/, '2-1/2" Colonial (C115)'],
        [/\bC118\b/, '2-1/2" Colonial (C118)'],
        [/\bH115\b/, '2-1/4" Colonial (H115)'],
        [/lakeside/i, '2-1/2" Lakeside Colonial (RBA-Lside-2.5)'],
        [/3.?1\/4.{0,6}colonial/i, '3-1/4" Colonial (RBA-Col-3.25)'],
        [/2.?1\/2.{0,6}flat/i, '2-1/2" Flat (RBA-Flat-2.5)'],
        [/3.?1\/4.{0,6}flat/i, '3-1/4" Flat (RBA-Flat-3.25)'],
        [/2.?1\/2.{0,6}ranch/i, '2-1/2" Ranch'],
        [/2.?1\/4.{0,6}ranch/i, '2-1/4" Ranch'],
        [/knotty.?pine/i, '1x4 Knotty Pine'],
        [/1x4.*s4s/i, '1x4 (RBA-S4S-3.5)'],
        [/1x3.*s4s/i, '1x3 (RBA-S4S-2.5)'],
      ];
      for (const [pat, label] of casingMap) {
        if (pat.test(text)) { jobInfo.casingProfile = label; break; }
      }

      // --- Trim style ---
      if (/picture[\s-]?frame/i.test(text)) jobInfo.trimStyle = "Picture Frame";
      else if (/traditional/i.test(text)) jobInfo.trimStyle = "Traditional";

      // --- Finish note ---
      const finishes = ["Premium Teak","Dark Walnut","Golden Oak","Provincial","Colonial Maple","Clear Poly","Golden Hickory","Honey Maple","Fruitwood","Aged Bourbon","River Stream","Dark River Stream","Honey Lite","RBA White","RBA Black","RBA Canvas"];
      for (const f of finishes) { if (text.includes(f)) { jobInfo.finishNote = f; break; } }

      // --- Units ---
      // Match size pairs: "95-7/8" 59-1/4"" or "96" 59"" (two adjacent quoted dimensions)
      // Also try W/H format as fallback: "95-7/8" W 59-1/4" H"
      const sizeRe = /(\d+(?:-\d+\/\d+)?)"\s+(\d+(?:-\d+\/\d+)?)"/g;
      const sizeReAlt = /(\d+(?:-\d+\/\d+)?)"?\s+W\s+(\d+(?:-\d+\/\d+)?)"?\s+H/g;
      const found = new Map();

      function extractUnitsFromRegex(re) {
        let sm;
        // Use a stricter ID pattern: 3-digit number NOT inside a phone number
        const idPat = /(?:^|\n)\s*([1-8]\d\d)\b/g;
        while ((sm = re.exec(text)) !== null) {
          const w = parseFraction(sm[1]), h = parseFraction(sm[2]);
          // Skip tiny/zero dimensions (headers, misc lines)
          if (w.whole + w.frac < 10 || h.whole + h.frac < 10) continue;
          // Look back 600 chars AND forward 400 chars for the nearest unit ID (100–899)
          const before = text.substring(Math.max(0, sm.index - 600), sm.index);
          const after = text.substring(sm.index, Math.min(text.length, sm.index + 400));
          const idsBefore = [...before.matchAll(idPat)];
          const idsAfter = [...after.matchAll(idPat)];
          // Pick closest ID: last one before, or first one after
          const idM = idsBefore.length > 0 ? idsBefore[idsBefore.length - 1] : idsAfter.length > 0 ? idsAfter[0] : null;
          if (!idM) continue;
          const uid = idM[1];
          if (parseInt(uid) >= 900) continue;

          // Unit type: scan nearby text
          const ctx = before.slice(-300) + text.substring(sm.index, sm.index + 200);
          let unitType = "Window";
          if (/entry[\s-]?door/i.test(ctx)) unitType = "Entry Door";
          else if (/patio[\s-]?door/i.test(ctx)) unitType = "Patio Door";

          // Room: look for common room names nearby
          let location = "";
          const rooms = ["Living","Dining","Kitchen","Master Bedroom","Bedroom","Bathroom","Bath","Office","Family","Garage","Basement","Sunroom","Laundry","Hallway","Entry","Foyer","Den","Loft"];
          for (const r of rooms) {
            if (new RegExp("\\b" + r + "\\b", "i").test(ctx)) { location = r; break; }
          }

          // Prefer fractional sizes over whole-inch sizes
          const hasFrac = w.frac > 0 || h.frac > 0;
          if (!found.has(uid) || hasFrac) {
            found.set(uid, { unitType, label: uid, location, widthWhole: w.whole, widthFrac: w.frac, heightWhole: h.whole, heightFrac: h.frac, jambDepthWhole: null, jambDepthFrac: null });
          }
        }
      }

      // Try primary format first (adjacent quoted dimensions), then W/H format as fallback
      extractUnitsFromRegex(sizeRe);
      if (found.size === 0) extractUnitsFromRegex(sizeReAlt);

      const units = Array.from(found.values()).sort((a, b) => parseInt(a.label) - parseInt(b.label));
      return { jobInfo, units };
    }

    function calcMaterials(unit) {
      const h = combineMeasurement(unit.heightWhole, unit.heightFrac);
      const w = combineMeasurement(unit.widthWhole, unit.widthFrac);
      const jd = combineMeasurement(unit.jambDepthWhole, unit.jambDepthFrac);
      const off = loadOffsets();
      const t = off.thickness;
      const materials = [];

      if (unit.unitType === "Window") {
        const isPF = unit.trimStyle === "Picture Frame";
        if (isPF) {
          const o = off.window_pf;
          const jw = jd + o.jamb_width;
          materials.push(
            { name: "Side Jamb Extension", qty: 2, length: h + o.sideJamb_length, width: jw, thickness: t, species: unit.species, category: "Jamb", jambStock: getJambStockWidth(jw) },
            { name: "Top/Bottom Jamb Extension", qty: 2, length: w + o.topBottomJamb_length, width: jw, thickness: t, species: unit.species, category: "Jamb", jambStock: getJambStockWidth(jw) },
            { name: "Side Casing", qty: 2, length: h + o.sideCasing_length, width: getProfileWidth(unit.casingProfile), thickness: null, species: unit.species, category: "Casing", profile: unit.casingProfile },
            { name: "Top/Bottom Casing", qty: 2, length: w + o.topBottomCasing_length, width: getProfileWidth(unit.casingProfile), thickness: null, species: unit.species, category: "Casing", profile: unit.casingProfile }
          );
        } else {
          const o = off.window_trad;
          const jw = jd + o.jamb_width;
          materials.push(
            { name: "Side Jamb Extension", qty: 2, length: h + o.sideJamb_length, width: jw, thickness: t, species: unit.species, category: "Jamb", jambStock: getJambStockWidth(jw) },
            { name: "Head Jamb Extension", qty: 1, length: w + o.headJamb_length, width: jw, thickness: t, species: unit.species, category: "Jamb", jambStock: getJambStockWidth(jw) },
            { name: "Sill / Stool", qty: 1, length: w + o.stool_length, width: jw + o.stool_width_extra, thickness: t, species: unit.species, category: "Jamb", jambStock: getJambStockWidth(jw + o.stool_width_extra) },
            { name: "Side Casing", qty: 2, length: h + o.sideCasing_length, width: getProfileWidth(unit.casingProfile), thickness: null, species: unit.species, category: "Casing", profile: unit.casingProfile },
            { name: "Head Casing", qty: 1, length: w + o.headCasing_length, width: getProfileWidth(unit.casingProfile), thickness: null, species: unit.species, category: "Casing", profile: unit.casingProfile },
            { name: "Apron", qty: 1, length: w + o.apron_length, width: getProfileWidth(unit.casingProfile), thickness: null, species: unit.species, category: "Casing", profile: unit.casingProfile }
          );
        }
      } else if (unit.unitType === "Entry Door") {
        const o = off.entry_door;
        materials.push(
          { name: "Side Casing", qty: 2, length: h + o.sideCasing_length, width: getProfileWidth(unit.casingProfile), thickness: null, species: unit.species, category: "Casing", profile: unit.casingProfile },
          { name: "Head Casing", qty: 1, length: w + o.headCasing_length, width: getProfileWidth(unit.casingProfile), thickness: null, species: unit.species, category: "Casing", profile: unit.casingProfile },
          { name: "Threshold", qty: 1, length: w + o.threshold_length, width: null, thickness: null, species: unit.thresholdSpecies || "Oak", category: "Threshold" }
        );
      } else if (unit.unitType === "Patio Door") {
        const o = off.patio_door;
        const jw = jd + o.jamb_width;
        materials.push(
          { name: "Side Jamb Extension", qty: 2, length: h + o.sideJamb_length, width: jw, thickness: t, species: unit.species, category: "Jamb", jambStock: getJambStockWidth(jw) },
          { name: "Head Jamb Extension", qty: 1, length: w + o.headJamb_length, width: jw, thickness: t, species: unit.species, category: "Jamb", jambStock: getJambStockWidth(jw) },
          { name: "Sill Jamb Extension", qty: 1, length: w + o.sillJamb_length, width: jw, thickness: t, species: unit.species, category: "Jamb", jambStock: getJambStockWidth(jw) },
          { name: "Side Casing", qty: 2, length: h + o.sideCasing_length, width: getProfileWidth(unit.casingProfile), thickness: null, species: unit.species, category: "Casing", profile: unit.casingProfile },
          { name: "Head Casing", qty: 1, length: w + o.headCasing_length, width: getProfileWidth(unit.casingProfile), thickness: null, species: unit.species, category: "Casing", profile: unit.casingProfile },
          { name: "Threshold", qty: 1, length: w + o.threshold_length, width: null, thickness: null, species: unit.thresholdSpecies || "Oak", category: "Threshold" }
        );
      }
      return materials;
    }

    function isUnitComplete(u) {

    // ─── SAVED JOBS (localStorage) ───
    function loadSavedJobs() {
      try {
        const data = localStorage.getItem("cutlist_jobs");
        return data ? JSON.parse(data) : [];
      } catch { return []; }
    }
    function saveJobToStorage(jobData) {
      try {
        const jobs = loadSavedJobs();
        const existing = jobs.findIndex(j => j.id === jobData.id);
        if (existing >= 0) jobs[existing] = jobData;
        else jobs.unshift(jobData);
        localStorage.setItem("cutlist_jobs", JSON.stringify(jobs.slice(0, 50)));
      } catch {}
    }
    function deleteJobFromStorage(jobId) {
      try {
        const jobs = loadSavedJobs().filter(j => j.id !== jobId);
        localStorage.setItem("cutlist_jobs", JSON.stringify(jobs));
      } catch {}
    }

    // ─── SHARED STORAGE API (Netlify Blobs) ───
    // All API calls try the server first, fall back to localStorage when offline.
    let _isOnline = navigator.onLine;
    window.addEventListener("online", () => { _isOnline = true; });
    window.addEventListener("offline", () => { _isOnline = false; });

    async function apiRequest(path, method = "GET", body = null) {
      const opts = { method, headers: {} };
      if (body) {
        opts.headers["Content-Type"] = "application/json";
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(path, opts);
      if (!res.ok) throw new Error(`API ${res.status}`);
      return res.json();
    }

    // Jobs API
    async function fetchJobsFromAPI() {
      try {
        const jobs = await apiRequest("/api/jobs");
        // Cache to localStorage for offline fallback
        if (Array.isArray(jobs)) {
          localStorage.setItem("cutlist_jobs", JSON.stringify(jobs.slice(0, 50)));
        }
        return jobs || [];
      } catch {
        return loadSavedJobs(); // offline fallback
      }
    }
    async function saveJobToAPI(jobData) {
      // Always save to localStorage as backup
      saveJobToStorage(jobData);
      try {
        await apiRequest("/api/jobs", "POST", jobData);
        return true;
      } catch {
        return false; // saved locally only
      }
    }
    async function deleteJobFromAPI(jobId) {
      deleteJobFromStorage(jobId);
      try {
        await apiRequest("/api/jobs?id=" + encodeURIComponent(jobId), "DELETE");
        return true;
      } catch {
        return false;
      }
    }

    // ─── LUMBER CATALOG ───
    const ALL_SPECIES = ["Oak", "Pine", "Maple", "Basswood"];
    const ALL_LENGTHS = [{ key: "96", label: "8'" }, { key: "120", label: "10'" }, { key: "144", label: "12'" }];

    function makeAvailability() {
      const a = {};
      ALL_SPECIES.forEach(s => { a[s] = {}; ALL_LENGTHS.forEach(l => a[s][l.key] = true); });
      return a;
    }
    function defaultCatalog() {
      return {
        casingProfiles: CASING_PROFILES.map(p => ({
          label: p.label, code: p.code, width: p.width, pineOnly: p.pineOnly || false,
          availability: makeAvailability()
        })),
        jambStock: JAMB_STOCK_WIDTHS.map(j => ({
          label: j.label, width: j.width,
          availability: makeAvailability()
        })),
        stains: {},
        paints: {},
      };
    }
    function loadCatalog() {
      try {
        const d = localStorage.getItem("cutlist_lumber_catalog");
        if (!d) return defaultCatalog();
        const parsed = JSON.parse(d);
        // Migrate: if old format (not array, or missing availability), reset to defaults
        if (parsed.casingProfiles && !Array.isArray(parsed.casingProfiles)) return defaultCatalog();
        if (parsed.casingProfiles?.[0] && !parsed.casingProfiles[0].availability) return defaultCatalog();

    // ─── BOARD OPTIMIZER ───
    // Groups cuts by material type + species + finish, then bin-packs into standard lengths
    function optimizeBoards(units, catalog) {
      const ALL_STOCK_LENGTHS = [96, 120, 144]; // 8ft, 10ft, 12ft in inches
      const STOCK_LABELS = { 96: "8'", 120: "10'", 144: "12'" };

      const MIN_CUTOFF = 5; // minimum 5" off each end of board
      const KERF = 0.125; // 1/8" saw blade kerf between cuts

      // Collect all cuts from all units
      const allCuts = [];
      units.forEach(unit => {
        if (!isUnitComplete(unit)) return;
        const mats = calcMaterials(unit);
        mats.forEach(m => {
          for (let i = 0; i < m.qty; i++) {
            allCuts.push({
              length: m.length + MIN_CUTOFF, // add 5" for bad ends
              rawLength: m.length,
              materialType: m.name.includes("Jamb") || m.name.includes("Sill") || m.name.includes("Stool") ? "Jamb Extension" : m.name.includes("Threshold") ? "Threshold" : m.name.includes("Apron") ? "Apron" : "Casing",
              species: m.species,
              finish: unit.finish || "",
              profile: m.profile || null,
              width: m.width,
              thickness: m.thickness,
              jambStock: m.jambStock || null,
              source: unit.label + (unit.location ? " (" + unit.location + ")" : ""),
              cutName: m.name,
            });
          }
        });
      });

      // Group cuts by material type + species + finish + profile + jambStock
      const groups = {};
      allCuts.forEach(cut => {
        const key = [cut.materialType, cut.species, cut.finish, cut.profile || "none", cut.jambStock ? cut.jambStock.label : "none"].join("|");
        if (!groups[key]) {
          groups[key] = {
            materialType: cut.materialType,
            species: cut.species,
            finish: cut.finish,
            profile: cut.profile,
            jambStock: cut.jambStock,
            width: cut.width,
            thickness: cut.thickness,
            cuts: []
          };
        }
        groups[key].cuts.push(cut);
      });

      // For each group, try ALL possible combinations of stock lengths and pick the one with least total waste
      const allBoards = [];
      Object.values(groups).forEach(group => {
        const sorted = [...group.cuts].sort((a, b) => b.length - a.length);

        // Determine available stock lengths for this group's species from catalog
        const section = group.materialType === "Casing" ? "casingProfiles" : "jambStock";
        let STOCK_LENGTHS = catalog ? getAvailableLengthsForSpecies(catalog, group.species, section) : ALL_STOCK_LENGTHS;
        // Safety: if nothing available, fall back to all lengths
        if (!STOCK_LENGTHS.length) STOCK_LENGTHS = ALL_STOCK_LENGTHS;
        STOCK_LENGTHS = STOCK_LENGTHS.filter(l => ALL_STOCK_LENGTHS.includes(l)).sort((a, b) => a - b);
        if (!STOCK_LENGTHS.length) STOCK_LENGTHS = ALL_STOCK_LENGTHS;

        // Try each stock length strategy and pick the best
        let bestBoards = null;
        let bestTotalWaste = Infinity;

        // Strategy: try packing with preference for each stock length, then pick best overall
        for (const preferredStock of [null, ...STOCK_LENGTHS]) {
          const boards = [];

          sorted.forEach(cut => {
            // Try to fit into existing board
            let bestBoard = null;
            let bestRemaining = Infinity;

            boards.forEach(board => {
              const needed = cut.length + KERF; // kerf between this cut and previous
              const newRemaining = board.remaining - needed;
              if (newRemaining >= 0 && newRemaining < bestRemaining) {
                bestBoard = board;
                bestRemaining = newRemaining;
              }
            });

            if (bestBoard) {
              bestBoard.cuts.push(cut);
              bestBoard.remaining -= (cut.length + KERF);
            } else {
              // New board needed - pick best stock length
              let stockLength;
              if (preferredStock && preferredStock >= cut.length) {
                stockLength = preferredStock;
              } else {
                // Pick smallest that fits
                stockLength = STOCK_LENGTHS.find(s => s >= cut.length);
                if (!stockLength) stockLength = STOCK_LENGTHS[STOCK_LENGTHS.length - 1];
              }
              boards.push({
                stockLength,
                cuts: [cut],
                remaining: stockLength - cut.length,
                materialType: group.materialType,
                species: group.species,
                finish: group.finish,
                profile: group.profile,
                jambStock: group.jambStock,
                width: group.width,
                thickness: group.thickness,
              });
            }
          });

          // Downsize boards where possible
          boards.forEach(board => {
            const kerfTotal = Math.max(0, board.cuts.length - 1) * KERF;
            const totalUsed = board.cuts.reduce((sum, c) => sum + c.length, 0) + kerfTotal;
            for (const sl of STOCK_LENGTHS) {
              if (sl >= totalUsed) {
                board.stockLength = sl;
                board.remaining = sl - totalUsed;
                break;
              }
            }
          });

          const totalWaste = boards.reduce((sum, b) => sum + b.remaining, 0);
          if (totalWaste < bestTotalWaste) {
            bestTotalWaste = totalWaste;
            bestBoards = boards;
          }
        }

        allBoards.push(...bestBoards);
      });

      // Sort boards: by material type, then species, then stock length
      allBoards.sort((a, b) => {
        if (a.materialType !== b.materialType) return a.materialType.localeCompare(b.materialType);
        if (a.species !== b.species) return a.species.localeCompare(b.species);
        return b.stockLength - a.stockLength;
      });

      // Summary counts
      const summary = {};
      allBoards.forEach(board => {
        const key = board.stockLength;
        summary[key] = (summary[key] || 0) + 1;
      });

      return { boards: allBoards, summary, STOCK_LABELS };
    }

        const sections = reportRef.current.querySelectorAll("[data-pdf-section]");
        const pdf = new jspdf.jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        const pdfW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
        const margin = 5;
        let currentY = margin;

        for (let i = 0; i < sections.length; i++) {
          const section = sections[i];
          const canvas = await html2canvas(section, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
          const imgData = canvas.toDataURL("image/png");
          const sectionW = pdfW - (margin * 2);
          const sectionH = (canvas.height * sectionW) / canvas.width;

          if (currentY + sectionH > pageH - margin && currentY > margin + 10) {
            pdf.addPage();
            currentY = margin;
          }
          if (sectionH > pageH - (margin * 2)) {
            const scale = (pageH - (margin * 2)) / sectionH;
            pdf.addImage(imgData, "PNG", margin, currentY, sectionW * scale, sectionH * scale);
            currentY += sectionH * scale + 4;
          } else {
            pdf.addImage(imgData, "PNG", margin, currentY, sectionW, sectionH);
            currentY += sectionH + 4;
          }
        }
        return pdf;
