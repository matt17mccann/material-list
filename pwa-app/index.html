                          {units.length > 1 && (
                            <button onClick={() => removeUnit(idx)} style={{
                              flex: 1, padding: "9px 0", border: "1px solid #E8E8E8", borderRadius: 6,
                              background: "#fff", fontSize: 13, fontWeight: 600, color: "#c0392b", cursor: "pointer"
                            }}>Remove</button>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}

              <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                <button onClick={addUnit} style={{
                  flex: 1, padding: "14px 0", border: "1px dashed #ccc", borderRadius: 6,
                  background: "transparent", fontSize: 15, fontWeight: 700, color: "#6DB344", cursor: "pointer"
                }}>+ Add Unit</button>
              </div>
            </div>

            {/* Board Summary Preview — always visible */}

            {/* Prefinishing Notes */}
            <div style={{
              background: "#fff", borderRadius: 8, padding: 18, marginBottom: 14,
              boxShadow: "0 2px 10px rgba(0,0,0,0.05)", border: "1px solid #E8E8E8"
            }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#6DB344", marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ width: 22, height: 22, background: "#6DB344", color: "#fff", borderRadius: "50%", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800 }}>5</span>
                Prefinishing Notes
              </div>
              <div>
                <label style={lbl}>Job-Wide Notes</label>
                <textarea style={{ ...inp, minHeight: 60, resize: "vertical", fontFamily: "inherit" }}
                  value={job.prefinishNotes} onChange={e => updateJob("prefinishNotes", e.target.value)}
                  placeholder="e.g. Premium Teak stain, 2 coats, sand between coats..." />
              </div>
              {units.length > 0 && (
                <div style={{ marginTop: 12 }}>
                  <label style={{ ...lbl, marginBottom: 8 }}>Per-Unit Overrides <span style={{ fontWeight: 400, color: "#999" }}>(leave blank to use job default)</span></label>
                  {units.map((unit, idx) => (
                    <div key={unit.id} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: "#555", minWidth: 60, flexShrink: 0 }}>{unit.label}</span>
                      <input style={{ ...inp, marginBottom: 0, fontSize: 12 }}
                        value={unit.prefinishNote || ""} onChange={e => updateUnit(idx, "prefinishNote", e.target.value)}
                        placeholder="Same as job default" />
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Extra Materials */}
            <div style={{
              background: "#fff", borderRadius: 8, padding: 18, marginBottom: 14,
              boxShadow: "0 2px 10px rgba(0,0,0,0.05)", border: "1px solid #E8E8E8"
            }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#6DB344", marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ width: 22, height: 22, background: "#6DB344", color: "#fff", borderRadius: "50%", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800 }}>6</span>
                Extra Materials
              </div>
              {(job.extraMaterials || []).map((item, idx) => (
                <div key={idx} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
                  {item.category === "Coil" ? (
                    <select style={{ ...sel, flex: 2, marginBottom: 0 }} value={item.description}
                      onChange={e => {
                        const updated = [...job.extraMaterials];
                        updated[idx] = { ...item, description: e.target.value };
                        updateJob("extraMaterials", updated);
                      }}>
                      {COIL_COLORS.map(c => <option key={c} value={`Coil - ${c}`}>Coil - {c}</option>)}
                    </select>
                  ) : (
                    <input style={{ ...inp, flex: 2, marginBottom: 0 }} value={item.description}
                      onChange={e => {
                        const updated = [...job.extraMaterials];
                        updated[idx] = { ...item, description: e.target.value };
                        updateJob("extraMaterials", updated);
                      }}
                      placeholder="Description" />
                  )}
                  <input style={{ ...inp, width: 60, flexShrink: 0, marginBottom: 0, textAlign: "center" }} type="number" min="1"
                    value={item.quantity} onChange={e => {
                      const updated = [...job.extraMaterials];
                      updated[idx] = { ...item, quantity: parseInt(e.target.value) || 1 };
                      updateJob("extraMaterials", updated);
                    }} />
                  <button onClick={() => {
                    const updated = (job.extraMaterials || []).filter((_, i) => i !== idx);
                    updateJob("extraMaterials", updated);
                  }} style={{ background: "none", border: "none", fontSize: 18, color: "#c0392b", cursor: "pointer", padding: "0 4px", flexShrink: 0 }}>✕</button>
                </div>
              ))}
              <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                <button onClick={() => updateJob("extraMaterials", [...(job.extraMaterials || []), { category: "Coil", description: "Coil - Terratone", quantity: 1 }])} style={{
                  flex: 1, padding: "10px 0", border: "1px dashed #ccc", borderRadius: 6,
                  background: "transparent", fontSize: 13, fontWeight: 700, color: "#6DB344", cursor: "pointer"
                }}>+ Add Coil</button>
                <button onClick={() => updateJob("extraMaterials", [...(job.extraMaterials || []), { category: "Other", description: "", quantity: 1 }])} style={{
                  flex: 1, padding: "10px 0", border: "1px dashed #ccc", borderRadius: 6,
                  background: "transparent", fontSize: 13, fontWeight: 700, color: "#6DB344", cursor: "pointer"
                }}>+ Add Other</button>
              </div>
            </div>

            {/* Board Summary + Recalculate */}
            <div key={boardCalcKey} style={{
              background: "#fff", borderRadius: 8, marginBottom: 14, overflow: "hidden",
              boxShadow: "0 2px 10px rgba(0,0,0,0.05)", border: "1px solid #E8E8E8"
            }}>
              <div style={{ padding: "12px 16px", background: "rgba(109,179,68,0.08)", fontSize: 13, fontWeight: 700, color: "#6DB344", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ width: 22, height: 22, background: "#6DB344", color: "#fff", borderRadius: "50%", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800 }}>7</span>
                  Board Summary
                </div>
                <button onClick={async () => {
                  setRecalculating(true);
                  const freshCatalog = await fetchCatalogFromAPI();
                  if (freshCatalog) setCatalog(freshCatalog);
                  setBoardCalcKey(k => k + 1);
                  setSubmitted(false);
                  setRecalculating(false);
                }} style={{
                  background: "#6DB344", color: "#fff", border: "none", borderRadius: 6,
                  padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer",
                  opacity: recalculating ? 0.6 : 1
                }} disabled={recalculating}>
                  {recalculating ? "Recalculating..." : "Recalculate Boards"}
                </button>
              </div>
              {allComplete && units.length > 0 ? (() => {
                const { boards, summary, STOCK_LABELS } = optimizeBoards(units, catalog);
                return (
                  <div style={{ padding: "12px 16px" }}>
                    <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 8 }}>
                      <div style={{ background: "#6DB344", color: "#fff", padding: "8px 16px", borderRadius: 8, fontWeight: 700, fontSize: 18 }}>
                        {boards.length} board{boards.length !== 1 ? "s" : ""} total
                      </div>
                      {Object.entries(summary).sort((a,b) => Number(a[0]) - Number(b[0])).map(([len, count]) => (
                        <div key={len} style={{ background: "rgba(109,179,68,0.08)", padding: "8px 16px", borderRadius: 8, fontWeight: 600, fontSize: 15, border: "1px solid #E8E8E8" }}>
                          {count}× {STOCK_LABELS[len]}
                        </div>
                      ))}
                    </div>
                    <div style={{ fontSize: 12, color: "#888" }}>Pulls latest lumber availability — full breakdown in report</div>
                  </div>
                );
              })() : (
                <div style={{ padding: "16px", fontSize: 13, color: "#999", textAlign: "center" }}>
                  Complete all units to see board calculations
                </div>
              )}
            </div>

            {/* Submit / Re-submit + Generate Reports */}
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {!submitted ? (
                <button onClick={() => saveJob(true)} disabled={!allComplete} style={{
                  width: "100%", padding: "18px 0", border: "none", borderRadius: 8,
                  background: allComplete ? "#6DB344" : "#ccc",
                  fontSize: 17, fontWeight: 800, color: allComplete ? "#fff" : "#888",
                  cursor: allComplete ? "pointer" : "not-allowed",
                  boxShadow: allComplete ? "0 4px 20px rgba(109,179,68,0.3)" : "none",
                  letterSpacing: 0.5
                }}>
                  {allComplete ? (savedJobs.some(j => j.id === jobId) ? "Re-Submit Job" : "Submit Job") : "Complete all units to submit"}
                </button>
              ) : (
                <>
                  <div style={{
                    background: "#e8f5e1", border: "1px solid #6DB344", borderRadius: 8,
                    padding: "14px 18px", display: "flex", alignItems: "center", gap: 10
                  }}>
                    <span style={{ fontSize: 22 }}>✓</span>
                    <div>
                      <div style={{ fontWeight: 700, color: "#2d6b1a", fontSize: 15 }}>Job Submitted</div>
                      <div style={{ fontSize: 12, color: "#555" }}>Saved and visible to all team members</div>
                    </div>
                  </div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#555", textAlign: "center", letterSpacing: 0.5, textTransform: "uppercase", marginTop: 4 }}>Generate Material List Report</div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={() => { setReportType("checklist"); setReportFrom("editor"); setView("report"); }} style={{
                      flex: 1, padding: "16px 0", border: "none", borderRadius: 8,
                      background: "#6DB344", fontSize: 15, fontWeight: 700, color: "#fff",
                      cursor: "pointer", boxShadow: "0 4px 20px rgba(109,179,68,0.3)",
                      letterSpacing: 0.3
                    }}>Materials Checklist</button>
                    <button onClick={() => { setReportType("detailed"); setReportFrom("editor"); setView("report"); }} style={{
                      flex: 1, padding: "16px 0", border: "1px solid #E8E8E8", borderRadius: 8,
                      background: "#fff", fontSize: 15, fontWeight: 700, color: "#6DB344",
                      cursor: "pointer", letterSpacing: 0.3
                    }}>Detailed Cut List</button>
                  </div>
                </>
              )}

              <button onClick={() => saveJob(false)} style={{
                width: "100%", padding: "14px 0", border: "1px solid #ddd", borderRadius: 8,
                background: "#fff", fontSize: 14, fontWeight: 600, color: "#888",
                cursor: "pointer", marginTop: 4
              }}>Save Progress</button>
            </div>
          </div>

          {/* Preview Modal — renders on editor view */}
          {pdfPreview && (
            <div style={{
              position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
              background: "rgba(0,0,0,0.5)", zIndex: 9999,
              display: "flex", alignItems: "center", justifyContent: "center", padding: 16
            }}>
              <div style={{
                background: "#fff", borderRadius: 16, width: "100%", maxWidth: 500,
                maxHeight: "80vh", display: "flex", flexDirection: "column", overflow: "hidden",
                boxShadow: "0 8px 40px rgba(0,0,0,0.25)"
              }}>
                <div style={{ padding: "16px 20px", borderBottom: "1px solid #eee", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div>
                    <div style={{ fontSize: 17, fontWeight: 700, color: "#1a1a1a" }}>Extracted Units</div>
                    <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>
                      {pdfPreview.units.length} unit{pdfPreview.units.length !== 1 ? "s" : ""} found
                      {pdfPreview.jobInfo?.customerName ? ` — ${pdfPreview.jobInfo.customerName}` : ""}
                    </div>
                    {pdfPreview.jobInfo && (
                      <div style={{ fontSize: 12, color: "#6DB344", marginTop: 2, fontWeight: 600 }}>
                        {pdfPreview.jobInfo.trimStyle || "Picture Frame"}
                        {pdfPreview.jobInfo.species ? ` | ${pdfPreview.jobInfo.species}` : ""}
                        {pdfPreview.jobInfo.casingProfile ? ` | ${pdfPreview.jobInfo.casingProfile.split(" (")[0]}` : ""}
                        {pdfPreview.jobInfo.finishNote ? ` | ${pdfPreview.jobInfo.finishNote}` : ""}
                      </div>
                    )}
                  </div>
                  <button onClick={() => setPdfPreview(null)} style={{
                    background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#999", padding: "0 4px"
                  }}>✕</button>
                </div>
                <div style={{ flex: 1, overflowY: "auto", padding: "12px 20px" }}>
                  {pdfPreview.units.map((u, i) => (
                    <div key={i} style={{
                      padding: "10px 12px", marginBottom: 8, borderRadius: 10,
                      border: "1px solid #e5e5e5", background: "#fafbfa"
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <span style={{ fontWeight: 700, fontSize: 14, color: "#2e5a7c" }}>
                          {u.label || `Unit ${i + 1}`}
                          {u.location ? <span style={{ fontWeight: 400, color: "#888", marginLeft: 6 }}>{u.location}</span> : null}
                        </span>
                        <span style={{
                          fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 6,
                          background: u.unitType === "Window" ? "rgba(109,179,68,0.08)" : u.unitType === "Entry Door" ? "#fdf2e9" : "#e8eef5",
                          color: u.unitType === "Window" ? "#6DB344" : u.unitType === "Entry Door" ? "#b87333" : "#2e5a7c"
                        }}>{u.unitType || "Window"}</span>
                      </div>
                      <div style={{ fontSize: 13, color: "#555", display: "flex", gap: 12, flexWrap: "wrap" }}>
                        <span>W: <b>{u.widthWhole || 0}{u.widthFrac ? `-${u.widthFrac}"` : `"`}</b></span>
                        <span>H: <b>{u.heightWhole || 0}{u.heightFrac ? `-${u.heightFrac}"` : `"`}</b></span>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ padding: "12px 20px", borderTop: "1px solid #eee", display: "flex", gap: 10 }}>
                  <button onClick={() => setPdfPreview(null)} style={{
                    flex: 1, padding: "12px 0", borderRadius: 10, border: "1px solid #ddd",
                    background: "#fff", fontSize: 14, fontWeight: 600, color: "#666", cursor: "pointer"
                  }}>Cancel</button>
                  <button onClick={confirmPdfUnits} style={{
                    flex: 2, padding: "12px 0", borderRadius: 10, border: "none",
                    background: "#6DB344", fontSize: 14, fontWeight: 700, color: "#fff", cursor: "pointer"
                  }}>Add {pdfPreview.units.length} Unit{pdfPreview.units.length !== 1 ? "s" : ""}</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
