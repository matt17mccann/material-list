                  {job.extraMaterials.map((item, j) => (
                    <tr key={j} style={{ borderBottom: "1px solid #ddd", background: j % 2 === 0 ? "#fff" : "#fafbfa" }}>
                      <td style={{ padding: "6px 12px" }}>{item.description || "—"}</td>
                      <td style={{ textAlign: "center", padding: "6px 8px", fontWeight: 600 }}>{item.quantity}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          <div data-pdf-section="board-summary"><BoardSummary units={units} catalog={catalog} /></div>

          <div data-pdf-section="footer" style={{ marginTop: 32, paddingTop: 16, borderTop: "1px solid #ddd", fontSize: 11, color: "#999", textAlign: "center" }}>
            Renewal by Andersen — Detailed Cut List • {new Date().toLocaleDateString()}
          </div>
        </div>
      );

      return (
        <div style={{ background: "#fff", minHeight: "100vh" }}>
          <div className="no-print" style={{
            position: "sticky", top: 0, zIndex: 100, padding: "10px 16px",
            background: "#1C1C1C", display: "flex", alignItems: "center",
            boxShadow: "0 2px 12px rgba(0,0,0,0.25)"
          }}>
            <button onClick={onBack} style={{
              background: "none", border: "none", color: "#fff", fontSize: 15, cursor: "pointer", fontWeight: 600, marginRight: "auto", padding: "6px 0"
            }}>← Back</button>

            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ display: "flex", background: "rgba(255,255,255,0.1)", borderRadius: 6, overflow: "hidden", border: "1px solid rgba(255,255,255,0.15)" }}>
                <button onClick={() => setActiveReport("checklist")} style={{
                  padding: "8px 14px", border: "none", fontSize: 12, fontWeight: 700, cursor: "pointer",
                  background: activeReport === "checklist" ? "#6DB344" : "transparent",
                  color: activeReport === "checklist" ? "#fff" : "rgba(255,255,255,0.6)"
                }}>Checklist</button>
                <button onClick={() => setActiveReport("detailed")} style={{
                  padding: "8px 14px", border: "none", fontSize: 12, fontWeight: 700, cursor: "pointer",
                  background: activeReport === "detailed" ? "#6DB344" : "transparent",
                  color: activeReport === "detailed" ? "#fff" : "rgba(255,255,255,0.6)"
                }}>Detailed</button>
              </div>
              <button onClick={async () => {
                const pdf = await generatePDFDoc();
                const blob = pdf.output("blob");
                const url = URL.createObjectURL(blob);
                const win = window.open(url);
                if (win) { win.onload = () => { win.print(); }; }
                else { pdf.save(`CutList_${(job.customerName || "Job").replace(/\s+/g, "_")}.pdf`); }
              }} style={{
                background: "none", border: "1px solid rgba(255,255,255,0.2)", color: "rgba(255,255,255,0.8)",
                padding: "8px 14px", borderRadius: 6, fontWeight: 600, fontSize: 12, cursor: "pointer"
              }}>Print</button>
              <button onClick={handlePDF} style={{
                background: "none", border: "1px solid rgba(255,255,255,0.2)", color: "rgba(255,255,255,0.8)",
                padding: "8px 14px", borderRadius: 6, fontWeight: 600, fontSize: 12, cursor: "pointer"
              }}>Save PDF</button>
            </div>

            <button onClick={handleEmail} style={{
              background: "#6DB344", border: "none", color: "#fff",
              padding: "8px 16px", borderRadius: 6, fontWeight: 700, fontSize: 12, cursor: "pointer", marginLeft: "auto"
            }}>Email</button>
          </div>

          {activeReport === "checklist" ? <ChecklistReport /> : <DetailedReport />}
        </div>
      );
    }

    // ─── RBA MARK SVG ───
    // ─── RBA MARK SVG ───
    function RBaMark({ size = 180, bgColor = "#1C1C1C" }) {
      return (
        <svg viewBox="0 0 200 100" width={size} height={size / 2} xmlns="http://www.w3.org/2000/svg">
          <polygon points="0,0 100,0 0,100" fill="#6DB344"/>
          <polygon points="100,0 100,100 0,100" fill={bgColor}/>
          <polygon points="100,0 200,0 200,100" fill="#6DB344"/>
          <polygon points="100,0 200,100 100,100" fill="#ffffff"/>
        </svg>
      );
    }

    // ─── MAIN APP ───
    function App() {
      const [view, setView] = useState("home");
      const [showInspo, setShowInspo] = useState(false); // home, editor, report, saved
      const [jobId, setJobId] = useState(null);
      const [job, setJob] = useState({ customerName: "", address: "", poNumber: "", techMeasurer: "", date: new Date().toISOString().split("T")[0], prefinishNotes: "", extraMaterials: [] });
      const [units, setUnits] = useState([emptyUnit(1)]);
      const [expandedUnit, setExpandedUnit] = useState(0);
      const [sameTrim, setSameTrim] = useState(true); // always start with common trim active
      const [globalTrim, setGlobalTrim] = useState({
        species: "Oak",
        casingProfile: '2-1/2" Colonial (C115)',
        finishType: "Stain",
        finish: "Dark Walnut (Minwax)",
        jambDepthWhole: "",
        jambDepthFrac: 0,
      });
      const [savedJobs, setSavedJobs] = useState([]);
      const [pdfParsing, setPdfParsing] = useState(false);
      const [pdfPreview, setPdfPreview] = useState(null); // { jobInfo, units } for review
      const [catalog, setCatalog] = useState(loadCatalog);
      const [offsets, setOffsetsState] = useState(loadOffsets);
      const [customMode, setCustomMode] = useState({}); // tracks which fields are in "type custom" mode
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [syncing, setSyncing] = useState(false);
      const [boardCalcKey, setBoardCalcKey] = useState(0); // bump to force board recalculation
      const [recalculating, setRecalculating] = useState(false);
      const [savedTab, setSavedTab] = useState("quick"); // "quick" or "edit"
      const [savedSearch, setSavedSearch] = useState("");
      const [savedFilter, setSavedFilter] = useState("drafts"); // "drafts" or "submitted"
      const [savedSort, setSavedSort] = useState("newest"); // "newest", "oldest", "last_name", "status"
      const [reportFrom, setReportFrom] = useState("editor"); // where to go back from report view
      const [submitted, setSubmitted] = useState(false); // tracks if current job has been submitted
      const [reportType, setReportType] = useState("checklist"); // "checklist" or "detailed"
      const pdfInputRef = useRef(null);

      // Online/offline tracking
      useEffect(() => {
        const goOnline = () => setIsOnline(true);
        const goOffline = () => setIsOnline(false);
        window.addEventListener("online", goOnline);
        window.addEventListener("offline", goOffline);
        return () => { window.removeEventListener("online", goOnline); window.removeEventListener("offline", goOffline); };
      }, []);

      // Browser history management — back button and refresh support
      const skipPush = useRef(false);
      useEffect(() => {
        if (skipPush.current) { skipPush.current = false; return; }
        window.history.pushState({ view }, "", null);
      }, [view]);

      useEffect(() => {
        // Replace initial history entry with home
        window.history.replaceState({ view: "home" }, "", null);
        const onPop = (e) => {
          const target = e.state?.view || "home";
          skipPush.current = true;
          setView(target);
        };
        window.addEventListener("popstate", onPop);
        return () => window.removeEventListener("popstate", onPop);
      }, []);

      // Load shared data from API on mount
      useEffect(() => {
        (async () => {
          setSyncing(true);
          try {
            // Fetch catalog from API, seed defaults if not yet on server
            const apiCatalog = await fetchCatalogFromAPI();
            if (apiCatalog) {
              setCatalog(apiCatalog);
            } else {
              // First time — seed server with local defaults
              const def = loadCatalog();
              setCatalog(def);
              saveCatalogToAPI(def);
            }

            // Fetch offsets from API, seed defaults if not yet on server
            const apiOffsets = await fetchOffsetsFromAPI();
            if (apiOffsets) {
              setOffsetsState(prev => ({ ...DEFAULT_OFFSETS, ...apiOffsets }));
            } else {
              const def = loadOffsets();
              setOffsetsState(def);
              saveOffsetsToAPI(def);
            }
          } catch {}
          setSyncing(false);
        })();
      }, []);

      // Load saved jobs from API when switching to views that need them
      useEffect(() => {
        (async () => {
          const jobs = await fetchJobsFromAPI();
          setSavedJobs(jobs);
        })();
      }, [view]);

      const updateJob = (f, v) => { setJob(p => ({ ...p, [f]: v })); setSubmitted(false); };
      const updateUnit = (idx, f, v) => { setUnits(p => p.map((u, i) => i === idx ? { ...u, [f]: v } : u)); setSubmitted(false); };
      const addUnit = () => {
        let newUnit = emptyUnit(units.length + 1);
        if (sameTrim) {
          newUnit = { ...newUnit, species: globalTrim.species, casingProfile: globalTrim.casingProfile, finishType: globalTrim.finishType, finish: globalTrim.finish };
        }
        setUnits(p => [...p, newUnit]);
        setExpandedUnit(units.length);
      };
      const removeUnit = (idx) => { if (units.length <= 1) return; setUnits(p => p.filter((_, i) => i !== idx)); };
      const duplicateUnit = (idx) => {
        const c = { ...units[idx], id: Date.now() + Math.random(), label: `${units[idx].label} (copy)` };
        setUnits(p => [...p.slice(0, idx + 1), c, ...p.slice(idx + 1)]);
        setExpandedUnit(idx + 1);
      };
      const applyGlobalTrim = useCallback((unitObj) => {
        if (!sameTrim) return unitObj;
        return { ...unitObj, species: globalTrim.species, casingProfile: globalTrim.casingProfile, finishType: globalTrim.finishType, finish: globalTrim.finish };
      }, [sameTrim, globalTrim]);

      const applyGlobalToUnit = (u, g, force) => {
        const updates = { species: g.species, casingProfile: g.casingProfile, finishType: g.finishType, finish: g.finish };
        // Only apply jamb depth if global has a value AND (force=true OR unit has no value yet)
        if (g.jambDepthWhole !== "" && g.jambDepthWhole != null) {
          if (force || !u.jambDepthWhole) {
            updates.jambDepthWhole = g.jambDepthWhole;
            updates.jambDepthFrac = g.jambDepthFrac || 0;
          }
        }
        return { ...u, ...updates };
      };

      const updateGlobalTrim = (field, value) => {
        const newGlobal = { ...globalTrim, [field]: value };
        // If changing species away from Pine, reset knotty pine profile
        if (field === "species" && value !== "Pine") {
          const profile = CASING_PROFILES.find(p => p.label === newGlobal.casingProfile);
          if (profile && profile.pineOnly) newGlobal.casingProfile = '2-1/2" Colonial (C115)';
        }
        setGlobalTrim(newGlobal);
        setSubmitted(false);
        // Apply to all existing units — force jamb depth so every change propagates
        const forceJamb = field === "jambDepthWhole" || field === "jambDepthFrac";
        setUnits(prev => prev.map(u => applyGlobalToUnit(u, newGlobal, forceJamb)));
      };

      // ─── PROCESS JSON TEXT (shared by file upload and paste) ───
      const processJSONText = (text) => {
        const jsonData = JSON.parse(text);
        return parseRSuiteJSON(jsonData);
      };

      // ─── FILE UPLOAD & PARSE (JSON or PDF) ───
      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setPdfParsing(true);
        try {
          if (pdfInputRef.current) pdfInputRef.current.value = "";
          const ext = file.name.split(".").pop().toLowerCase();

          let data;

          if (ext === "json") {
            // ── JSON (rSuite DL Export) — use FileReader for max Safari compatibility ──
            const text = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.onerror = () => reject(new Error("Failed to read file"));
              reader.readAsText(file);
            });
            data = processJSONText(text);
          } else {
            // ── PDF (Installer Package) ──
            if (typeof pdfjsLib === "undefined") {
              throw new Error("PDF library failed to load. Check your internet connection and reload the page.");
            }
            const arrayBuffer = await file.arrayBuffer();
            const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
            const pdf = await loadingTask.promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const content = await page.getTextContent();
              let lastY = null, pageText = "";
              for (const item of content.items) {
                if (!item.str) continue;
                const y = item.transform[5];
                if (lastY !== null && Math.abs(y - lastY) > 3) pageText += "\n";
                pageText += item.str + (item.str.endsWith(" ") ? "" : " ");
                lastY = y;
              }
              fullText += pageText + "\n\n";
            }
            data = parseInstallerPackageText(fullText);
          }

          if (!data.units || !data.units.length) {
            alert("No units found in this file.\n\nSupported formats:\n• rSuite DL Export (.json)\n• RBA Installer Package (.pdf)");
            setPdfParsing(false);
            return;
          }
          setPdfPreview({ jobInfo: data.jobInfo || {}, units: data.units });
        } catch (err) {
          alert("Upload error: " + (err.message || String(err)));
          console.error("Upload error:", err);
        }
        setPdfParsing(false);
      };

      const confirmPdfUnits = () => {
        if (!pdfPreview) return;
        const { jobInfo, units: pdfUnits } = pdfPreview;

        // Populate job info from PDF
        if (jobInfo) {
          if (jobInfo.customerName) updateJob("customerName", jobInfo.customerName);
          if (jobInfo.address) updateJob("address", jobInfo.address);
        }

        // Extract job-wide trim details from the 900 line item info
        const pdfTrimStyle = jobInfo?.trimStyle || "Picture Frame";
        const pdfSpecies = (jobInfo?.species && SPECIES.includes(jobInfo.species)) ? jobInfo.species : "Oak";
        const pdfCasing = (jobInfo?.casingProfile && CASING_PROFILES.find(p => p.label === jobInfo.casingProfile))
          ? jobInfo.casingProfile : '2-1/2" Colonial (C115)';

        // Determine finish type and color from the 900 line item
        let pdfFinishType = "Stain";
        let pdfFinish = "Dark Walnut (Minwax)";
        if (jobInfo?.finishNote) {
          // Match stain by exact label OR by short name (e.g. "Premium Teak" matches "Premium Teak (Zar)")
          const isStain = STAINS.find(s => s.label === jobInfo.finishNote || s.label.startsWith(jobInfo.finishNote + " ("));
          const isPaint = PAINTS.includes(jobInfo.finishNote);
          if (isStain) { pdfFinishType = "Stain"; pdfFinish = isStain.label; }
          else if (isPaint) { pdfFinishType = "Paint"; pdfFinish = jobInfo.finishNote; }
          else { pdfFinishType = "Stain"; pdfFinish = jobInfo.finishNote; } // custom stain
        }

        // Auto-set global trim from imported data
        const importedTrim = { species: pdfSpecies, casingProfile: pdfCasing, finishType: pdfFinishType, finish: pdfFinish };
        setGlobalTrim(importedTrim);
        setSameTrim(true);

        const startNum = units.length + 1;
        const newUnits = pdfUnits.map((u, i) => {
          let nu = emptyUnit(startNum + i);
          nu.label = u.label || `Unit ${startNum + i}`;
          nu.location = u.location || "";
          nu.unitType = u.unitType || "Window";
          nu.trimStyle = pdfTrimStyle;
          nu.species = pdfSpecies;
          nu.casingProfile = pdfCasing;
          nu.finishType = pdfFinishType;
          nu.finish = pdfFinish;
          if (u.widthWhole != null) nu.widthWhole = u.widthWhole;
          if (u.widthFrac != null) nu.widthFrac = u.widthFrac;
          if (u.heightWhole != null) nu.heightWhole = u.heightWhole;
          if (u.heightFrac != null) nu.heightFrac = u.heightFrac;
          if (u.jambDepthWhole != null) nu.jambDepthWhole = u.jambDepthWhole;
          if (u.jambDepthFrac != null) nu.jambDepthFrac = u.jambDepthFrac;
          // If global trim is active, override with global settings
          if (sameTrim) {
            nu = { ...nu, species: globalTrim.species, casingProfile: globalTrim.casingProfile, finishType: globalTrim.finishType, finish: globalTrim.finish };
          }
          return nu;
        });
        // If only the default empty unit exists, replace it; otherwise append
        if (units.length === 1 && !units[0].widthWhole && !units[0].heightWhole) {
          setUnits(newUnits);
        } else {
          setUnits(prev => [...prev, ...newUnits]);
        }
        setPdfPreview(null);
        setExpandedUnit(0);
        setView("editor");
      };

      const allComplete = units.every(isUnitComplete);

      const startNewJob = () => {
        setSameTrim(null);
        setJobId(Date.now().toString());
        setJob({ customerName: "", address: "", poNumber: "", techMeasurer: "", date: new Date().toISOString().split("T")[0], prefinishNotes: "", extraMaterials: [] });
        setUnits([emptyUnit(1)]);
        setExpandedUnit(0);
        setSubmitted(false);
        setView("editor");
      };

      const saveJob = async (isSubmit) => {
        // Preserve existing status/starred if this job was previously saved
        const existing = savedJobs.find(j => j.id === jobId);
        const status = isSubmit ? "submitted" : "in_progress";
        const data = { id: jobId, job, units, savedAt: new Date().toISOString(), status, starred: existing?.starred || false };
        const synced = await saveJobToAPI(data);
        const jobs = await fetchJobsFromAPI();
        setSavedJobs(jobs);
        if (isSubmit) {
          setSubmitted(true);
        } else {
          alert(synced ? "Job saved!" : "Job saved locally (offline)");
        }
      };

      const loadJob = (saved) => {
        setJobId(saved.id);
        setJob(saved.job);
        setUnits(saved.units);
        setExpandedUnit(0);
        setSubmitted(saved.status && saved.status !== "in_progress");
        setView("editor");
      };

      const deleteJob = async (id) => {
        await deleteJobFromAPI(id);
        const jobs = await fetchJobsFromAPI();
        setSavedJobs(jobs);
      };

      const updateJobMeta = async (savedJob, updates) => {
        const updated = { ...savedJob, ...updates };
        await saveJobToAPI(updated);
        const jobs = await fetchJobsFromAPI();
        setSavedJobs(jobs);
      };

      const loadJobForReport = (saved) => {
        setJobId(saved.id);
        setJob(saved.job);
        setUnits(saved.units);
        setSubmitted(true);
        setReportType("checklist");
        setReportFrom("saved");
        setView("report");
      };

      const inp = { width: "100%", padding: "11px 14px", border: "1px solid #ddd", borderRadius: 6, fontSize: 16, background: "#fff", boxSizing: "border-box" };
      const sel = { ...inp, appearance: "auto" };
      const lbl = { fontSize: 11, fontWeight: 700, color: "#777", marginBottom: 5, display: "block", letterSpacing: 0.8, textTransform: "uppercase" };

      // ─── HOME SCREEN ───
      if (view === "home") {
        return (
          <div style={{ minHeight: "100vh", background: "#1C1C1C", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>

            {showInspo && (
              <div onClick={() => setShowInspo(false)} style={{
                position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
                background: "rgba(0,0,0,0.9)", zIndex: 1000,
                display: "flex", alignItems: "center", justifyContent: "center",
                padding: 20, cursor: "pointer"
              }}>
                <div style={{ maxWidth: 500, width: "100%", textAlign: "center" }}>
                  <img src={INSPO_PHOTO} alt="Inspirational" style={{ width: "100%", borderRadius: 8, boxShadow: "0 8px 40px rgba(0,0,0,0.6)" }} />
                  <p style={{ color: "rgba(255,255,255,0.6)", fontSize: 13, fontStyle: "italic", fontFamily: "Georgia, serif", marginTop: 12 }}>The man. The myth. The measurer.</p>
                  <p style={{ color: "rgba(255,255,255,0.35)", fontSize: 11, marginTop: 8 }}>tap anywhere to close</p>
                </div>
              </div>
            )}

            <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", width: "100%", maxWidth: 360 }}>
              {/* Logo mark */}
              <div style={{ marginBottom: 20 }}>
                <RBaMark size={200} />
              </div>

              {/* Brand name */}
              <div style={{ textAlign: "center", marginBottom: 32 }}>
                <div style={{ fontSize: 22, fontWeight: 900, color: "#fff", letterSpacing: 1, lineHeight: 1.15 }}>RENEWAL</div>
                <div style={{ fontSize: 17, fontWeight: 700, color: "#fff", letterSpacing: 0.5 }}>by ANDERSEN</div>
                <div style={{ width: 40, height: 2, background: "#6DB344", margin: "12px auto 10px" }} />
                <div style={{ fontSize: 11, fontWeight: 700, color: "#6DB344", letterSpacing: 2.5, textTransform: "uppercase" }}>Lake Superior Region</div>
                <div style={{ fontSize: 13, fontWeight: 500, color: "rgba(255,255,255,0.45)", letterSpacing: 1.5, textTransform: "uppercase", marginTop: 4 }}>Material Cut List</div>
                <div style={{ fontSize: 9, color: "rgba(255,255,255,0.2)", marginTop: 8 }}>v2.1 — Apr 3 2026</div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginTop: 6 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: isOnline ? "#6DB344" : "#f39c12", boxShadow: isOnline ? "0 0 6px rgba(109,179,68,0.5)" : "0 0 6px rgba(243,156,18,0.5)" }} />
                  <span style={{ fontSize: 10, color: isOnline ? "rgba(109,179,68,0.7)" : "rgba(243,156,18,0.7)" }}>{syncing ? "Syncing..." : isOnline ? "Connected" : "Offline"}</span>
                </div>
              </div>

              <button onClick={startNewJob} style={{
                width: "100%", padding: "16px 0", border: "none", borderRadius: 6,
                background: "#6DB344", fontSize: 15, fontWeight: 700,
                color: "#fff", cursor: "pointer",
                letterSpacing: 0.5, marginBottom: 10
              }}>+ New Job</button>

              <button onClick={() => { setSavedFilter("drafts"); setView("saved"); }} style={{
                width: "100%", padding: "14px 0", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 6,
                background: "rgba(255,255,255,0.06)", fontSize: 14, fontWeight: 600,
                color: "rgba(255,255,255,0.7)", cursor: "pointer", letterSpacing: 0.3, marginBottom: 8
              }}>Saved Jobs ({savedJobs.filter(j => j.status !== "submitted").length})</button>

              <button onClick={() => { setSavedFilter("submitted"); setView("saved"); }} style={{
                width: "100%", padding: "14px 0", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 6,
                background: "rgba(255,255,255,0.06)", fontSize: 14, fontWeight: 600,
                color: "rgba(255,255,255,0.7)", cursor: "pointer", letterSpacing: 0.3
              }}>Submitted Jobs ({savedJobs.filter(j => j.status === "submitted").length})</button>

              <div style={{ display: "flex", gap: 8, width: "100%", marginTop: 10 }}>
                <button onClick={() => setView("lumber")} style={{
                  flex: 1, padding: "12px 0", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6,
                  background: "rgba(255,255,255,0.04)", fontSize: 12, fontWeight: 600,
                  color: "rgba(255,255,255,0.5)", cursor: "pointer", letterSpacing: 0.3
                }}>Available Material</button>
                <button onClick={() => setView("offsets")} style={{
                  flex: 1, padding: "12px 0", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6,
                  background: "rgba(255,255,255,0.04)", fontSize: 12, fontWeight: 600,
                  color: "rgba(255,255,255,0.5)", cursor: "pointer", letterSpacing: 0.3
                }}>Offsets</button>
              </div>
            </div>

            <div style={{ textAlign: "center", paddingBottom: 8 }}>
              <button onClick={() => setShowInspo(true)} style={{
                background: "none", border: "none", color: "rgba(255,255,255,0.2)",
                fontSize: 11, cursor: "pointer", letterSpacing: 0.5
              }}>· · ·</button>
            </div>

          </div>
        );
      }

      // ─── AVAILABLE LUMBER ───
      if (view === "lumber") {
        const updateCatalog = (updated) => { setCatalog(updated); saveCatalogToAPI(updated); };

        const toggleAvail = (section, index, species, lengthKey) => {
          const arr = [...catalog[section]];
          const item = { ...arr[index], availability: { ...arr[index].availability } };
          item.availability[species] = { ...item.availability[species], [lengthKey]: !item.availability[species]?.[lengthKey] };
          arr[index] = item;
          updateCatalog({ ...catalog, [section]: arr });
        };

        const AvailGrid = ({ item, index, section }) => {
          const [open, setOpen] = useState(false);
          // Build a summary of available species/lengths
          const summary = ALL_SPECIES.map(sp => {
            const lengths = ALL_LENGTHS.filter(l => item.availability?.[sp]?.[l.key] !== false).map(l => l.label);
            return lengths.length > 0 ? `${sp}: ${lengths.join("/")}` : null;
          }).filter(Boolean).join(" · ");

          return (
            <div style={{ background: "#fff", borderRadius: 8, marginBottom: 8, border: "1px solid #E8E8E8", overflow: "hidden" }}>
              <div onClick={() => setOpen(!open)} style={{
                padding: "12px 16px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center"
              }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "#333" }}>{item.label}</div>
                  {!open && <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{summary || "No availability set"}</div>}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <button onClick={(e) => {
                    e.stopPropagation();
                    if (!confirm("Delete " + item.label + "?")) return;
                    updateCatalog({ ...catalog, [section]: catalog[section].filter((_, i) => i !== index) });
                  }} style={{ background: "none", border: "none", fontSize: 13, color: "#c0392b", cursor: "pointer" }}>Delete</button>
                  <span style={{ fontSize: 16, color: "#999", transition: "transform 0.2s", transform: open ? "rotate(180deg)" : "none" }}>▾</span>
                </div>
              </div>
              {open && (
                <div style={{ padding: "0 16px 14px" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr>
                        <th style={{ textAlign: "left", padding: "4px 8px", fontSize: 11, color: "#888", fontWeight: 600 }}></th>
                        {ALL_LENGTHS.map(l => <th key={l.key} style={{ padding: "4px 8px", fontSize: 11, color: "#888", fontWeight: 600, textAlign: "center" }}>{l.label}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {ALL_SPECIES.map(sp => (
                        <tr key={sp} style={{ borderTop: "1px solid #f0f0f0" }}>
                          <td style={{ padding: "6px 8px", fontWeight: 600, color: "#333" }}>{sp}</td>
                          {ALL_LENGTHS.map(l => {
                            const on = item.availability?.[sp]?.[l.key] !== false;
                            return (
                              <td key={l.key} style={{ textAlign: "center", padding: "6px 8px" }}>
                                <div onClick={() => toggleAvail(section, index, sp, l.key)} style={{
                                  width: 28, height: 28, borderRadius: 6, margin: "0 auto", cursor: "pointer",
                                  display: "flex", alignItems: "center", justifyContent: "center",
                                  background: on ? "#6DB344" : "#E8E8E8", color: on ? "#fff" : "#ccc",
                                  fontSize: 14, fontWeight: 700, transition: "all 0.15s", userSelect: "none"
                                }}>{on ? "✓" : ""}</div>
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        };

        const addMaterial = (section, promptLabel, promptWidth) => {
          const name = prompt(promptLabel);
          if (!name) return;
          const width = parseFloat(prompt(promptWidth) || "2.5");
          const code = name.replace(/[^a-zA-Z0-9]/g, "-");
          const arr = [...(catalog[section] || []), { label: name, code, width, pineOnly: false, availability: makeAvailability() }];
          updateCatalog({ ...catalog, [section]: arr });
        };

        return (
          <div style={{ minHeight: "100vh", background: "#F5F5F4", padding: "0 0 40px 0" }}>
            <div style={{
              position: "sticky", top: 0, zIndex: 100, background: "#1C1C1C",
              padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center",
              boxShadow: "0 2px 12px rgba(0,0,0,0.25)"
            }}>
              <button onClick={() => setView("home")} style={{ background: "none", border: "none", color: "#fff", fontSize: 16, cursor: "pointer", fontWeight: 600 }}>← Home</button>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>Available Material</div>
              <div style={{ width: 70 }} />
            </div>
            <div style={{ maxWidth: 900, margin: "0 auto", padding: "16px 16px 0" }}>

              <div style={{ fontSize: 11, fontWeight: 700, color: "#6DB344", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8, padding: "0 4px" }}>Casing Profiles</div>
              {(catalog.casingProfiles || []).map((item, i) => <AvailGrid key={item.code+i} item={item} index={i} section="casingProfiles" />)}
              <button onClick={() => addMaterial("casingProfiles", "New casing profile name:", "Profile width in inches (e.g. 2.5):")} style={{ width: "100%", padding: "12px 0", border: "1px dashed #ccc", borderRadius: 6, background: "transparent", fontSize: 13, fontWeight: 700, color: "#6DB344", cursor: "pointer", marginBottom: 24 }}>+ Add Casing Profile</button>

              <div style={{ fontSize: 11, fontWeight: 700, color: "#6DB344", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8, padding: "0 4px" }}>Jamb Stock</div>
              {(catalog.jambStock || []).map((item, i) => <AvailGrid key={item.label+i} item={item} index={i} section="jambStock" />)}
              <button onClick={() => addMaterial("jambStock", "New jamb stock label (e.g. 1x3):", "Actual width in inches (e.g. 2.5):")} style={{ width: "100%", padding: "12px 0", border: "1px dashed #ccc", borderRadius: 6, background: "transparent", fontSize: 13, fontWeight: 700, color: "#6DB344", cursor: "pointer", marginBottom: 24 }}>+ Add Jamb Stock</button>

              <div style={{ fontSize: 11, fontWeight: 700, color: "#6DB344", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8, padding: "0 4px" }}>Stain Colors</div>
              <div style={{ background: "#fff", borderRadius: 8, padding: "12px 16px", marginBottom: 4, border: "1px solid #E8E8E8" }}>
                {(catalog.customStains || []).concat(STAINS.map(s => s.label)).filter((v, i, a) => a.indexOf(v) === i).map(s => (
                  <div key={s} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #f0f0f0" }}>
                    <span style={{ fontSize: 14 }}>{s}</span>
                    <button onClick={() => {
                      const custom = (catalog.customStains || []).filter(c => c !== s);
                      updateCatalog({ ...catalog, customStains: custom });
                    }} style={{ background: "none", border: "none", fontSize: 12, color: "#c0392b", cursor: "pointer" }}>✕</button>
                  </div>
                ))}
              </div>
              <button onClick={() => { const n = prompt("New stain color name:"); if (n) updateCatalog({ ...catalog, customStains: [...(catalog.customStains || []), n] }); }}
                style={{ width: "100%", padding: "10px 0", border: "1px dashed #ccc", borderRadius: 6, background: "transparent", fontSize: 13, fontWeight: 700, color: "#6DB344", cursor: "pointer", marginBottom: 24 }}>+ Add Stain</button>

              <div style={{ fontSize: 11, fontWeight: 700, color: "#6DB344", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8, padding: "0 4px" }}>Paint Colors</div>
              <div style={{ background: "#fff", borderRadius: 8, padding: "12px 16px", marginBottom: 4, border: "1px solid #E8E8E8" }}>
                {(catalog.customPaints || []).concat(PAINTS).filter((v, i, a) => a.indexOf(v) === i).map(p => (
                  <div key={p} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #f0f0f0" }}>
                    <span style={{ fontSize: 14 }}>{p}</span>
                    <button onClick={() => {
                      const custom = (catalog.customPaints || []).filter(c => c !== p);
                      updateCatalog({ ...catalog, customPaints: custom });
                    }} style={{ background: "none", border: "none", fontSize: 12, color: "#c0392b", cursor: "pointer" }}>✕</button>
                  </div>
                ))}
              </div>
              <button onClick={() => { const n = prompt("New paint color name:"); if (n) updateCatalog({ ...catalog, customPaints: [...(catalog.customPaints || []), n] }); }}
                style={{ width: "100%", padding: "10px 0", border: "1px dashed #ccc", borderRadius: 6, background: "transparent", fontSize: 13, fontWeight: 700, color: "#6DB344", cursor: "pointer", marginBottom: 24 }}>+ Add Paint Color</button>

              <div style={{ fontSize: 11, fontWeight: 700, color: "#6DB344", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8, padding: "0 4px" }}>Other Items</div>
              <div style={{ background: "#fff", borderRadius: 8, padding: "12px 16px", marginBottom: 4, border: "1px solid #E8E8E8" }}>
                {(catalog.otherItems || []).length === 0 && <div style={{ fontSize: 13, color: "#999", padding: "6px 0" }}>No custom items yet</div>}
                {(catalog.otherItems || []).map((item, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #f0f0f0" }}>
                    <span style={{ fontSize: 14 }}>{item}</span>
                    <button onClick={() => updateCatalog({ ...catalog, otherItems: (catalog.otherItems || []).filter((_, j) => j !== i) })}
                      style={{ background: "none", border: "none", fontSize: 12, color: "#c0392b", cursor: "pointer" }}>✕</button>
                  </div>
                ))}
              </div>
              <button onClick={() => { const n = prompt("New item name:"); if (n) updateCatalog({ ...catalog, otherItems: [...(catalog.otherItems || []), n] }); }}
                style={{ width: "100%", padding: "10px 0", border: "1px dashed #ccc", borderRadius: 6, background: "transparent", fontSize: 13, fontWeight: 700, color: "#6DB344", cursor: "pointer", marginBottom: 24 }}>+ Add Other Item</button>
            </div>
          </div>
        );
      }

      // ─── OFFSETS ───
      if (view === "offsets") {
        const updateOffset = (section, key, val) => {
          const updated = { ...offsets, [section]: { ...offsets[section], [key]: parseFloat(val) || 0 } };
          setOffsetsState(updated);
          saveOffsetsToAPI(updated);
        };
        const resetSection = (section) => {
          const updated = { ...offsets, [section]: { ...DEFAULT_OFFSETS[section] } };
          setOffsetsState(updated);
          saveOffsetsToAPI(updated);
        };
        const OffsetRow = ({ label, desc, value, onChange }) => (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #E8E8E8", gap: 12 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#333" }}>{label}</div>
              <div style={{ fontSize: 11, color: "#888" }}>{desc}</div>
            </div>
            <input type="number" step="0.0625" value={value} onChange={e => onChange(e.target.value)}
              style={{ width: 80, padding: "6px 8px", border: "1px solid #ddd", borderRadius: 6, fontSize: 15, fontWeight: 700, textAlign: "center" }} />
          </div>
        );
        const OffsetCard = ({ title, section, fields }) => (
          <div style={{ background: "#fff", borderRadius: 8, padding: "12px 16px", marginBottom: 12, border: "1px solid #E8E8E8" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#6DB344", letterSpacing: 1.5, textTransform: "uppercase" }}>{title}</div>
              <button onClick={() => resetSection(section)} style={{ background: "none", border: "none", fontSize: 11, color: "#999", cursor: "pointer", textDecoration: "underline" }}>Reset defaults</button>
            </div>
            {fields.map(f => <OffsetRow key={f.key} label={f.label} desc={f.desc} value={offsets[section]?.[f.key] ?? 0} onChange={v => updateOffset(section, f.key, v)} />)}
          </div>
        );
        return (
          <div style={{ minHeight: "100vh", background: "#F5F5F4", padding: "0 0 40px 0" }}>
            <div style={{
              position: "sticky", top: 0, zIndex: 100, background: "#1C1C1C",
              padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center",
              boxShadow: "0 2px 12px rgba(0,0,0,0.25)"
            }}>
              <button onClick={() => setView("home")} style={{ background: "none", border: "none", color: "#fff", fontSize: 16, cursor: "pointer", fontWeight: 600 }}>← Home</button>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>Offsets</div>
              <div style={{ width: 70 }} />
            </div>
            <div style={{ maxWidth: 900, margin: "0 auto", padding: "16px 16px 0" }}>
              </div>
              <div style={{ fontSize: 13, color: "#888", marginBottom: 16, padding: "0 4px" }}>These values are added to Width (W), Height (H), or Jamb Depth (JD) when calculating cut lengths. Negative = subtract.</div>

              <OffsetCard title="Windows — Picture Frame" section="window_pf" fields={[
                { key: "sideJamb_length", label: "Side Jamb Length", desc: "H + value" },
                { key: "topBottomJamb_length", label: "Top/Bottom Jamb Length", desc: "W + value" },
                { key: "jamb_width", label: "Jamb Width", desc: "JD + value" },
                { key: "sideCasing_length", label: "Side Casing Length", desc: "H + value" },
                { key: "topBottomCasing_length", label: "Top/Bottom Casing Length", desc: "W + value" },
              ]} />
              <OffsetCard title="Windows — Traditional" section="window_trad" fields={[
                { key: "sideJamb_length", label: "Side Jamb Length", desc: "H + value" },
                { key: "headJamb_length", label: "Head Jamb Length", desc: "W + value" },
                { key: "jamb_width", label: "Jamb Width", desc: "JD + value" },
                { key: "stool_length", label: "Sill/Stool Length", desc: "W + value" },
                { key: "stool_width_extra", label: "Stool Width Extra", desc: "Added to jamb width" },
                { key: "sideCasing_length", label: "Side Casing Length", desc: "H + value" },
                { key: "headCasing_length", label: "Head Casing Length", desc: "W + value" },
                { key: "apron_length", label: "Apron Length", desc: "W + value" },
              ]} />
              <OffsetCard title="Entry Doors" section="entry_door" fields={[
                { key: "sideCasing_length", label: "Side Casing Length", desc: "H + value" },
                { key: "headCasing_length", label: "Head Casing Length", desc: "W + value" },
                { key: "threshold_length", label: "Threshold Length", desc: "W + value" },
              ]} />
              <OffsetCard title="Patio Doors" section="patio_door" fields={[
                { key: "sideJamb_length", label: "Side Jamb Length", desc: "H + value" },
                { key: "headJamb_length", label: "Head Jamb Length", desc: "W + value" },
                { key: "sillJamb_length", label: "Sill Jamb Length", desc: "W + value" },
                { key: "jamb_width", label: "Jamb Width", desc: "JD + value" },
                { key: "sideCasing_length", label: "Side Casing Length", desc: "H + value" },
                { key: "headCasing_length", label: "Head Casing Length", desc: "W + value" },
                { key: "threshold_length", label: "Threshold Length", desc: "W + value" },
              ]} />

              <div style={{ background: "#fff", borderRadius: 8, padding: "12px 16px", marginBottom: 12, border: "1px solid #E8E8E8" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#6DB344", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Jamb Thickness</div>
                <OffsetRow label="Extension Thickness" desc="Applied to all jamb extensions" value={offsets.thickness ?? 0.625}
                  onChange={v => { const u = { ...offsets, thickness: parseFloat(v) || 0 }; setOffsetsState(u); saveOffsetsToAPI(u); }} />
              </div>
            </div>
          </div>
        );
      }

      // ─── SAVED JOBS ───
      if (view === "saved") {
        const STATUS_OPTIONS = [
          { key: "list_printed", label: "List Printed", color: "#fff", bg: "#6DB344", borderColor: "#6DB344" },
          { key: "ready_to_install", label: "Ready for Install", color: "#f39c12", bg: "rgba(243,156,18,0.1)", borderColor: "#f39c12" },
          { key: "complete", label: "Install Complete", color: "#888", bg: "rgba(136,136,136,0.1)", borderColor: "#ccc" },
        ];

        const searchLower = savedSearch.toLowerCase().trim();
        const filteredJobs = savedJobs
          .filter(s => savedFilter === "submitted" ? s.status === "submitted" : s.status !== "submitted")
          .filter(s => {
            if (!searchLower) return true;
            return (s.job.customerName || "").toLowerCase().includes(searchLower)
              || (s.job.address || "").toLowerCase().includes(searchLower)
              || (s.job.poNumber || "").toLowerCase().includes(searchLower);
          })
          .sort((a, b) => {
            // Starred always first
            if ((b.starred ? 1 : 0) !== (a.starred ? 1 : 0)) return (b.starred ? 1 : 0) - (a.starred ? 1 : 0);
            if (savedSort === "oldest") return (a.savedAt || "").localeCompare(b.savedAt || "");
            if (savedSort === "last_name") {
              const aLast = (a.job.customerName || "").trim().split(/\s+/).pop().toLowerCase();
              const bLast = (b.job.customerName || "").trim().split(/\s+/).pop().toLowerCase();
              return aLast.localeCompare(bLast);
            }
            if (savedSort === "status") {
              const order = { "": 0, list_printed: 1, ready_to_install: 2, complete: 3 };
              const diff = (order[a.status || ""] || 0) - (order[b.status || ""] || 0);
              if (diff !== 0) return diff;
            }
            return (b.savedAt || "").localeCompare(a.savedAt || "");
          });

        const renderJobCard = (s, onClickJob) => {
          const status = STATUS_OPTIONS.find(o => o.key === (s.status || "in_progress")) || STATUS_OPTIONS[0];
          return (
            <div key={s.id} style={{
              background: "#fff", borderRadius: 8, marginBottom: 10,
              boxShadow: "0 2px 8px rgba(0,0,0,0.06)", border: `1px solid ${s.starred ? "#f39c12" : "#E8E8E8"}`,
              overflow: "hidden"
            }}>
              <div style={{ display: "flex", alignItems: "stretch" }}>
                {/* Star */}
                <div onClick={(e) => { e.stopPropagation(); updateJobMeta(s, { starred: !s.starred }); }} style={{
                  width: 44, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
                  background: s.starred ? "rgba(243,156,18,0.08)" : "transparent", flexShrink: 0,
                  fontSize: 20, color: s.starred ? "#f39c12" : "#ddd", transition: "all 0.15s"
                }}>
                  {s.starred ? "★" : "☆"}
                </div>

                {/* Main content */}
                <div onClick={() => onClickJob(s)} style={{ cursor: "pointer", flex: 1, padding: "12px 12px 8px" }}>
                  <div style={{ fontWeight: 700, fontSize: 16, color: "#333" }}>{s.job.customerName || "Untitled Job"}</div>
                  <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>
                    {s.job.date} • {s.units.length} unit{s.units.length !== 1 ? "s" : ""}
                    {s.job.techMeasurer ? ` • ${s.job.techMeasurer}` : ""}
                  </div>
                  {s.job.address && <div style={{ fontSize: 12, color: "#aaa", marginTop: 2 }}>{s.job.address}</div>}
                </div>

                {/* Delete */}
                <div style={{ display: "flex", alignItems: "center", paddingRight: 8 }}>
                  <button onClick={(e) => { e.stopPropagation(); if (confirm("Delete this job?")) deleteJob(s.id); }} style={{
                    background: "none", border: "none", fontSize: 16, color: "#c0392b", cursor: "pointer", padding: 8
                  }}>✕</button>
                </div>
              </div>

              {/* Status pills */}
              <div style={{ display: "flex", gap: 6, padding: "0 12px 10px 56px" }}>
                {STATUS_OPTIONS.map(opt => {
                  const active = (s.status || "") === opt.key;
                  return (
                    <button key={opt.key} onClick={(e) => { e.stopPropagation(); updateJobMeta(s, { status: active ? "" : opt.key }); }} style={{
                      padding: "4px 10px", borderRadius: 12, fontSize: 11, fontWeight: 600, cursor: "pointer",
                      border: active ? `1.5px solid ${opt.borderColor}` : "1px solid #E8E8E8",
                      background: active ? opt.bg : "#fff",
                      color: active ? opt.color : "#bbb",
                      transition: "all 0.15s"
                    }}>{opt.label}</button>
                  );
                })}
              </div>
            </div>
          );
        };

        return (
          <div style={{ minHeight: "100vh", background: "#F5F5F4", padding: "0 0 40px 0" }}>
            {/* Top Bar */}
            <div style={{
              position: "sticky", top: 0, zIndex: 100, background: "#1C1C1C",
              padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center",
              boxShadow: "0 2px 12px rgba(0,0,0,0.25)"
            }}>
              <button onClick={() => { setView("home"); setSavedSearch(""); }} style={{ background: "none", border: "none", color: "#fff", fontSize: 16, cursor: "pointer", fontWeight: 600 }}>← Home</button>
              <div style={{ textAlign: "center", lineHeight: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>{savedFilter === "submitted" ? "Submitted Jobs" : "Saved Jobs"}</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginTop: 2 }}>{filteredJobs.length} job{filteredJobs.length !== 1 ? "s" : ""}</div>
              </div>
              <div style={{ width: 70 }} />
            </div>
            <div style={{ maxWidth: 900, margin: "0 auto", padding: "16px 16px 0" }}>

              {/* Search */}
              <input
                type="text" value={savedSearch} onChange={e => setSavedSearch(e.target.value)}
                placeholder="Search by name, address, or PO#..."
                style={{
                  width: "100%", padding: "11px 14px", border: "1px solid #ddd", borderRadius: 8, fontSize: 15,
                  background: "#fff", boxSizing: "border-box", marginBottom: 14
                }}
              />

              {/* Sort bar */}
              <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
                {[
                  { key: "newest", label: "Newest" },
                  { key: "oldest", label: "Oldest" },
                  { key: "last_name", label: "Last Name" },
                  { key: "status", label: "Status" },
                ].map(opt => (
                  <button key={opt.key} onClick={() => setSavedSort(opt.key)} style={{
                    padding: "6px 12px", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer",
                    border: savedSort === opt.key ? "1.5px solid #6DB344" : "1px solid #ddd",
                    background: savedSort === opt.key ? "rgba(109,179,68,0.08)" : "#fff",
                    color: savedSort === opt.key ? "#6DB344" : "#999",
                    transition: "all 0.15s"
                  }}>{opt.label}</button>
                ))}
              </div>

              {/* Tabs */}
              <div style={{ display: "flex", gap: 0, marginBottom: 16, borderRadius: 8, overflow: "hidden", border: "1px solid #E8E8E8" }}>
                {[{ key: "quick", label: "Quick View" }, { key: "edit", label: "Edit Jobs" }].map(tab => (
                  <button key={tab.key} onClick={() => setSavedTab(tab.key)} style={{
                    flex: 1, padding: "10px 0", border: "none", fontSize: 14, fontWeight: 700, cursor: "pointer",
                    background: savedTab === tab.key ? "#6DB344" : "#fff",
                    color: savedTab === tab.key ? "#fff" : "#888",
                    transition: "all 0.15s"
                  }}>{tab.label}</button>
                ))}
              </div>

              {/* Job list */}
              {filteredJobs.length === 0 ? (
                <div style={{ textAlign: "center", padding: 40, color: "#999" }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>📋</div>
                  <p>{savedSearch ? "No jobs match your search" : "No saved jobs yet"}</p>
                </div>
              ) : filteredJobs.map(s =>
                renderJobCard(s, savedTab === "edit" ? loadJob : loadJobForReport)
              )}
            </div>
          </div>

              <div style={{ display: "grid", gap: 10 }}>

                </div>
                <div>

                  <input style={inp} value={job.address} onChange={e => updateJob("address", e.target.value)} placeholder="123 Main St" />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <div>
                    <label style={lbl}>PO Number</label>
                    <input style={inp} value={job.poNumber} onChange={e => updateJob("poNumber", e.target.value)} placeholder="e.g. PO-12345" />

                  <div>
                    <label style={lbl}>Tech Measurer</label>
                    <select style={sel} value={job.techMeasurer} onChange={e => updateJob("techMeasurer", e.target.value)}>
                      <option value="">Select...</option>
                      <option>Matt McCann</option>
                      <option>Darren Williams</option>
                      <option>Steve Cvek</option>
                    </select>
                  </div>
                </div>
                <div>
                  <label style={lbl}>Date</label>
                  <input style={inp} type="date" value={job.date} onChange={e => updateJob("date", e.target.value)} />

              </div>
            </div>

            {/* Units Section */}
            
            {/* Trim Selection */}
            <div style={{

              <div>

                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <div>
                      <label style={lbl}>Species</label>
                      <select style={sel} value={globalTrim.species} onChange={e => updateGlobalTrim("species", e.target.value)}>

                        </label>

                      {customMode.globalFinish
                        ? <input style={inp} value={globalTrim.finish} onChange={e => updateGlobalTrim("finish", e.target.value)} placeholder="Type custom color..." />

              {units.map((unit, idx) => {
                const expanded = expandedUnit === idx;
                const complete = isUnitComplete(unit);
                const mats = complete ? calcMaterials(unit) : [];
                const needsJD = unit.unitType !== "Entry Door";
                const needsTrim = unit.unitType === "Window";
                const needsThreshold = unit.unitType !== "Window";

                return (

                    background: "#fff", borderRadius: 8, marginBottom: 8,
                    boxShadow: "0 2px 10px rgba(0,0,0,0.05)",

                    overflow: "hidden", transition: "all 0.2s"

                    {/* Header */}
                    <div onClick={() => setExpandedUnit(expanded ? -1 : idx)} style={{
                      padding: "12px 16px", cursor: "pointer", display: "flex", justifyContent: "space-between",
                      alignItems: "center", background: "#fff"
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 9, height: 9, borderRadius: "50%", background: complete ? "#6DB344" : "#ccc", flexShrink: 0 }} />
                        <div>
                          <span style={{ fontWeight: 700, fontSize: 15, color: unit.label ? "#6DB344" : "#bbb" }}>{unit.label || `Unit ${idx + 1}`}</span>
                          <span style={{ fontSize: 12, color: "#888", marginLeft: 8 }}>
                            {unit.unitType}{complete ? ` • ${toFraction(combineMeasurement(unit.widthWhole, unit.widthFrac))}" × ${toFraction(combineMeasurement(unit.heightWhole, unit.heightFrac))}"` : ""}
                          </span>
                        </div>
                      </div>
                      <span style={{ fontSize: 16, color: "#999", transition: "transform 0.2s", transform: expanded ? "rotate(180deg)" : "none" }}>▾</span>
                    </div>

                    {expanded && (
                      <div style={{ padding: "14px 16px 18px" }}>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                          <div>
                            <label style={lbl}>Unit Label</label>
                            <input style={inp} value={unit.label} onChange={e => updateUnit(idx, "label", e.target.value)} placeholder="101" />
                          </div>
                          <div>
                            <label style={lbl}>Location</label>
                            <input style={inp} value={unit.location} onChange={e => updateUnit(idx, "location", e.target.value)} placeholder="Master Bedroom" />
                          </div>
                          <div>
                            <label style={lbl}>Unit Type</label>
                            <select style={sel} value={unit.unitType} onChange={e => updateUnit(idx, "unitType", e.target.value)}>
                              {UNIT_TYPES.map(t => <option key={t}>{t}</option>)}
                            </select>
                          </div>
                          <div>
                            <label style={lbl}>Species</label>
                            <select style={sel} value={unit.species} onChange={e => updateUnit(idx, "species", e.target.value)}>
                              {SPECIES.map(s => {
                                const avail = isSpeciesAvailableInCatalog(catalog, s);
                                return <option key={s} value={s} disabled={!avail}>{s}{!avail ? " (unavailable)" : ""}</option>;
                              })}
                            </select>
                          </div>
                          {needsTrim && (
                            <div>
                              <label style={lbl}>Trim Style</label>
                              <select style={sel} value={unit.trimStyle} onChange={e => updateUnit(idx, "trimStyle", e.target.value)}>
                                {TRIM_STYLES.map(t => <option key={t}>{t}</option>)}
                              </select>
                            </div>
                          )}
                          <div>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                              <label style={lbl}>Casing Profile</label>

                                <input type="checkbox" checked={!!customMode["casing_"+idx]} onChange={() => setCustomMode(p => ({ ...p, ["casing_"+idx]: !p["casing_"+idx] }))} style={{ width: 13, height: 13 }} /> Custom
                              </label>
                            </div>
                            {customMode["casing_"+idx]
                              ? <input style={inp} value={unit.casingProfile} onChange={e => updateUnit(idx, "casingProfile", e.target.value)} placeholder="Type custom profile..." />

                                  {getAvailableProfiles(unit.species).map(p => {
                                    const avail = isProfileAvailableInCatalog(catalog, p.label, unit.species);
                                    return <option key={p.label} value={p.label} disabled={!avail}>{p.label}{!avail ? " (unavailable)" : ""}</option>;
                                  })}

                            }
                          </div>

                            <label style={lbl}>Finish Type</label>
                            <select style={sel} value={unit.finishType} onChange={e => {
                              const newType = e.target.value;
                              const newFinish = newType === "Stain" ? STAINS[0].label : PAINTS[0];
                              setUnits(p => p.map((u, i) => i === idx ? { ...u, finishType: newType, finish: newFinish } : u));
                            }}>
                              {FINISH_TYPES.map(t => <option key={t}>{t}</option>)}
                            </select>
                          </div>
                          <div>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                              <label style={lbl}>{unit.finishType === "Stain" ? "Stain Color" : "Paint Color"}</label>
                              <label style={{ fontSize: 10, color: "#999", cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                                <input type="checkbox" checked={!!customMode["finish_"+idx]} onChange={() => setCustomMode(p => ({ ...p, ["finish_"+idx]: !p["finish_"+idx] }))} style={{ width: 13, height: 13 }} /> Custom
                              </label>

                            {customMode["finish_"+idx]
                              ? <input style={inp} value={unit.finish} onChange={e => updateUnit(idx, "finish", e.target.value)} placeholder="Type custom color..." />

                            </div>

                            onFracChange={v => updateUnit(idx, "widthFrac", v)}

                                    <td style={{ textAlign: "center", padding: "7px 6px", color: "#666", fontWeight: m.jambStock ? 600 : 400 }}>{m.jambStock ? m.jambStock.label : "—"}</td>
                                    <td style={{ textAlign: "center", padding: "7px 6px", color: "#666" }}>{m.thickness != null ? toFraction(m.thickness) + '"' : "—"}</td>
                                    <td style={{ textAlign: "center", padding: "7px 6px", color: "#666", fontSize: 11 }}>{m.profile || "—"}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>

                        <div style={{ marginTop: 12 }}>

                          {(unit.manualMaterials || []).map((mm, mi) => (
                            <div key={mi} style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 6 }}>

                                  const updated = [...(unit.manualMaterials || [])];

                              <input style={{ ...inp, width: 40, marginBottom: 0, fontSize: 12, textAlign: "center" }} type="number" min="1"

                              <input style={{ ...inp, width: 55, marginBottom: 0, fontSize: 12, textAlign: "center" }} type="number" step="0.0625"

                                  updated[mi] = { ...mm, length: parseFloat(e.target.value) || 0 };
                                  updateUnit(idx, "manualMaterials", updated);
                                }} />
                              <button onClick={() => {
                                const updated = (unit.manualMaterials || []).filter((_, i) => i !== mi);
                                updateUnit(idx, "manualMaterials", updated);

                            </div>

                          <button onClick={() => {
